name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    frontend:
        name: Frontend (tsc + vite build)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - name: TypeScript type-check
              run: npx tsc --noEmit
            - name: Vite production build
              run: npx vite build

    backend:
        name: Backend (cargo test on Windows)
        runs-on: windows-latest
        # Clipboard tests open the real Windows clipboard, so they need
        # a Windows runner (no headless display issues — the message
        # pump still works in CI).
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt
            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      src-tauri/target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
            - name: cargo fmt --check
              working-directory: src-tauri
              run: cargo fmt -- --check
              continue-on-error: true # not yet a hard gate; flip when style is fully aligned
            - name: cargo clippy
              working-directory: src-tauri
              run: cargo clippy --all-targets -- -D warnings
              continue-on-error: true # see fmt note above
            - name: cargo build
              working-directory: src-tauri
              run: cargo build
            - name: cargo test (clipboard regression suite, single-threaded)
              working-directory: src-tauri
              run: cargo test --bin super-clip clipboard_tests -- --test-threads=1
